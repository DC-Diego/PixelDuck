<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./style/style.css" rel="stylesheet">
  <link href="./style/newFile.css" rel="stylesheet">
  <link href="./style/popups.css" rel="stylesheet">
  <link href="./style/timeline.css" rel="stylesheet">
  <link href="./style/UI_Components.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Duck</title>
</head>
<body>

  <!-- TDKY  -->

  <div id="newFile" class="page">
    <!-- <h1 style="background-color: red;">PixelDuck</h1> -->
    <div id="welcomeScreen">
      <div class="imagePartition">
        <h1>PixelDuck</h1>
        <img src="./sources/CyclesSaturno.png" alt="">
      </div>


      <div class="optionsPartition">
        <div class="file-options">
          <h1>File:</h1>
          <div id="btnNewFile"><i class="bi bi-file-earmark-plus"></i><p>New file</p></div>
          <div><i class="bi bi-folder-fill"></i><p>Open file</p></div>
          <span></span>
        </div>
        <div>
          <h1>Recent files:</h1>
        </div>
      </div>


    </div>


  </div>

  <div id="workSpace" class="page">
    <div class="menuBar">  
      <img id="logo" src="./sources/logo.png" alt="Logo PixelDuck">
      <div class="buttons-menuBar">
        <h1>File</h1>
      </div>  
      <div class="buttons-menuBar">
        <h1>Edit</h1>
      </div>
      <div class="buttons-menuBar">
        <h1>Select</h1>
      </div>
      <div class="buttons-menuBar">
        <h1>Image</h1>
      </div>
      <div class="buttons-menuBar">
        <h1>Preferences</h1>
      </div>

    </div>
    <div class="centerArea"> 
      <div id="toolbar">
        <!-- move, brush, eraser, select, flood, dropper, crop, zoom etc. --> <!-- Eraser -->

        <div class="tool"><span class="material-symbols-outlined"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></span></div>
        <div class="tool"><span class="material-symbols-outlined">brush</span>  </div>
        <div class="tool"><span class="material-symbols-outlined">ink_eraser</span> </div>
        <div class="tool"><span class="material-symbols-outlined">select</span></div>
        <div class="tool"><span class="material-symbols-outlined">format_color_fill</span></div>
        <div class="tool"><span class="material-symbols-outlined">colorize</span></div>
        <div class="tool"><span class="material-symbols-outlined">crop</span></div>
        <div class="tool"><span class="material-symbols-outlined">zoom_in</span> </div>
        <div class="tool"><span class="material-symbols-outlined">zoom_out</span> </div>
        <div class="tool"><span class="material-symbols-outlined">search</span></div>



        
      </div>
      <div class="viewport">
        <div id="toggleToolbar">
          <svg class="toggle-icon" viewBox="0 0 24 24">
            <line x1="16" y1="12" x2="8" y2="5" />
            <line x1="16" y1="12" x2="8" y2="19" />
          </svg>
        </div>
        <!-- Workspace - Duck Studio!  -->
        <div id="canvasArea"> 
        </div>
      </div>

      <div id="propertiesPanel">
        <div class="splitter v">
          <svg class="splitter-icon" viewBox="0 0 24 24">
            <circle cx="3" cy="12" r="2"/>
            <circle cx="12" cy="12" r="2"/>
            <circle cx="21" cy="12" r="2"/>
          </svg>
        </div>

      </div>




    </div>
    <div class="timeline" id="timeline"> 
      <div class="splitter h">
        <svg class="splitter-icon" viewBox="0 0 24 24">
          <circle cx="3" cy="12" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="21" cy="12" r="2"/>
        </svg>
      </div>

      <div class="timeline-header">
        <div id="settings">

          <div class="div-toggle-reveal" id="onionSkin" title="Onion skin">
            <button class="icon-buttons toggle-reveal-js" aria-label="Onion skin">
              <svg class="toggle-icon rotate" viewBox="0 0 300 300">
                <use  href="./sources/svg/onionSkin.svg#onionSkin" ></use>

            </svg>
            </button>
            <div class="reveal-container-js">
              <button class="icon-buttons input-ctrl" id="onionSkinAdvancedOptions" aria-label="onionSkin" style="width:18px;height: 30px;"><svg class="SVG-icon" viewBox="0 0 150 300" style="width:20px;">
                <circle cx="75" cy="50" r="25" fill="#ffffff"  />
                <circle cx="75" cy="150" r="25" fill="#ffffff"  />
                <circle cx="75" cy="250" r="25" fill="#ffffff"  />


              </svg>
              </button>


            </div>
          </div>


     
          <div class="group-label-input" id="playSpeed" title="Play Speed">
            <svg style="width: 25px; padding-right: 3px; border-right: solid 1px white;" class="toggle-icon rotate" viewBox="0 0 300 300">
              <use href="./sources/svg/clock.svg#clock"></use>
            </svg>
            <button class="icon-buttons input-ctrl step-down-js h b" aria-label="Decrement"><svg class="toggle-icon" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>

            <input class="input-stepper-js " type="number" min="0.05" max="2" value="1" step="0.05" style="width: 30px;">
            <button class="icon-buttons input-ctrl step-up-js h b" aria-label="Increment"><svg class="toggle-icon rotate" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
    
          </div>

       

          
         

          <div class="div-toggle-reveal combo-js" id="loopingMode" title="Looping">
            <h1 class="combo-text-js"></h1>
            <!-- <input> -->
            <button class="icon-buttons input-ctrl combo-button-js"  aria-label="Looping">
              <svg class="toggle-icon " viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
                <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
          </div>

          <div class="div-toggle-reveal combo-js" id="FPSset" title="FPS (Frames Per Second)">
            <input class="combo-input-js" type="number" min="0" >
            <button class="icon-buttons input-ctrl combo-button-js"  aria-label="Looping">
              <svg class="toggle-icon " viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
                <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
          </div>


        </div>
        <div id="controls">
          <button id="timeline-btn-starter-frame" class="icon-buttons rotate" title="Jump to starter frame" aria-label="Jump to starter frame"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/endFrame.svg#end-frame"></use></svg></button>
          <button id="timeline-btn-previous-second" class="icon-buttons rotate" title="Jump to previous second"  aria-label="Jump to previous second"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/nextSecond.svg#next-second" ></use></svg></button>
          <button id="timeline-btn-previous-frame" class="icon-buttons rotate" title="Jump to previous frame"  aria-label="Jump to previous frame"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/nextFrame.svg#next-frame" ></use></svg></button>
          <div class="play-pause">
            <button id="timeline-btn-play-backward" class="icon-buttons rotate" title="Play animation backward" aria-label="Play animation backward"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/play.svg#play" ></use></svg></button>
            <button id="timeline-btn-pause" class="icon-buttons" title="Pause animation" aria-label="Pause animation"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/pause.svg#pause" ></use></svg></button>
            <button id="timeline-btn-play-forward" class="icon-buttons" title="Play animation forward"  aria-label="Play animation forward"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/play.svg#play" ></use></svg></button>
          </div>
          <button id="timeline-btn-next-frame" class="icon-buttons" title="Jump to next frame" aria-label="Jump to next frame"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/nextFrame.svg#next-frame" ></use></svg></button>
          <button id="timeline-btn-next-second" class="icon-buttons" title="Jump to next second" aria-label="Jump to next Second"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/nextSecond.svg#next-second" ></use></svg></button>
          <button id="timeline-btn-ending-frame" class="icon-buttons" title="Jump to ending frame" aria-label="Jump to ending frame"><svg viewBox="0 0 16 16" class="SVG-icon"> <use  href="./sources/svg/endFrame.svg#end-frame" ></use></svg></button>

        </div>
        <div id="status">

          <div class="group-label-input" id="currentFrame"  title="current frame">
            <button class="icon-buttons input-ctrl step-down-js" aria-label="Decrement"><svg class="toggle-icon" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
                <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
            <input class="input-stepper-js" type="number" min="0" max="10000" value="0">
            <button class="icon-buttons input-ctrl step-up-js" aria-label="Increment"><svg class="toggle-icon rotate" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
          </div>

          <div class="group-label-input" id="starterFrame"  title="Starter frame">
            <button class="icon-buttons input-ctrl step-down-js h" aria-label="Decrement"><svg class="toggle-icon" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
            <h1>Start</h1>
            <input class="input-stepper-js " type="number"min="0" max="10000" value="0" style="width: 30px;">
            <button class="icon-buttons input-ctrl step-up-js h" aria-label="Increment"><svg class="toggle-icon rotate" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>


          </div>
          <div class="group-label-input" id="endingFrame" title="Ending frame">
            <button class="icon-buttons input-ctrl step-down-js h" aria-label="Decrement"><svg class="toggle-icon" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>
            <h1>End</h1>
            <input class="input-stepper-js " type="number" min="0" max="10000" value="0" style="width: 30px;">
            <button class="icon-buttons input-ctrl step-up-js h" aria-label="Increment"><svg class="toggle-icon rotate" viewBox="0 0 24 24"><line x1="16" y1="12" x2="8" y2="5" />
              <line x1="16" y1="12" x2="8" y2="19" /></svg>
            </button>

          </div>





        </div>

      </div>





    </div>  
  </div>

  <script type="module" src="./scripts/main.js"></script>
</body>
</html>
